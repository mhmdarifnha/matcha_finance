<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker 📊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f5f1; }
        .matcha-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .history-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="p-6 text-[#2d3e30]">
    <div class="max-w-md mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold">Hai Aripp🍵</h1>
            <p class="opacity-70 text-sm">Cek keuanganmu hari ini.</p>
        </header>

        <div class="bg-[#9dbf91] p-6 rounded-[2rem] text-white shadow-xl shadow-green-100 mb-6">
            <p class="text-xs uppercase tracking-widest opacity-80 mb-1">Total Remaining</p>
            <h2 id="remaining" class="text-4xl font-extrabold tracking-tight">Loading...</h2>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="matcha-card p-4 rounded-3xl border border-[#e0e7da]">
                <p class="text-[10px] uppercase font-bold text-green-600">Income</p>
                <p id="income" class="text-lg font-bold text-[#4a6b43]">Rp 0</p>
            </div>
            <div class="matcha-card p-4 rounded-3xl border border-[#e0e7da]">
                <p class="text-[10px] uppercase font-bold text-red-400">Expense</p>
                <p id="expense" class="text-lg font-bold text-[#8b5e5e]">Rp 0</p>
            </div>
        </div>

        <h3 class="font-bold mb-4 px-2">Your Wallets</h3>
        <div class="space-y-3 mb-8">
            <div class="flex justify-between items-center p-4 bg-white rounded-2xl shadow-sm border border-[#eef2eb]">
                <div class="flex items-center gap-3">
                    <div class="bg-[#d5e2cd] p-2 rounded-xl text-xl">💵</div>
                    <span class="font-semibold">Cash</span>
                </div>
                <span id="cash" class="font-bold">Rp 0</span>
            </div>
            <div class="flex justify-between items-center p-4 bg-white rounded-2xl shadow-sm border border-[#eef2eb]">
                <div class="flex items-center gap-3">
                    <div class="bg-[#d5e2cd] p-2 rounded-xl text-xl">📱</div>
                    <span class="font-semibold">E-Wallet</span>
                </div>
                <span id="eWallet" class="font-bold">Rp 0</span>
            </div>
        </div>

        <h3 class="font-bold mb-4 px-2">Monthly History 🗓️</h3>
        <div id="history-container" class="bg-white rounded-[2rem] p-2 shadow-sm border border-[#eef2eb] overflow-hidden">
            <p class="text-center py-4 text-sm opacity-50 italic">Memuat riwayat...</p>
        </div>

        <button onclick="fetchData()" class="w-full mt-8 py-4 bg-[#2d3e30] text-[#d5e2cd] rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
            Refresh Data 🔄
        </button>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCGZTc-x4s7UTnNLWH77venh_2ReLYDhDtFdiR9rw70ESeM0jNNBQaXoIowBvm8GAmEw/exec';

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL, { redirect: 'follow' });
                const data = await response.json();
                
                // Update Main Info
                document.getElementById('remaining').innerText = 'Rp ' + (data.remaining || 0).toLocaleString('id-ID');
                document.getElementById('income').innerText = 'Rp ' + (data.income || 0).toLocaleString('id-ID');
                document.getElementById('expense').innerText = 'Rp ' + (data.expense || 0).toLocaleString('id-ID');
                document.getElementById('cash').innerText = 'Rp ' + (data.cash || 0).toLocaleString('id-ID');
                document.getElementById('eWallet').innerText = 'Rp ' + (data.eWallet || 0).toLocaleString('id-ID');
                
                // Update History List
                const container = document.getElementById('history-container');
                container.innerHTML = ''; // Clear loading

                if (data.history && data.history.length > 0) {
                    data.history.reverse().forEach(item => { // Urutkan dari bulan terbaru
                        const div = document.createElement('div');
                        div.className = 'history-item flex justify-between items-center p-4 border-b border-[#f3f5f1]';
                        div.innerHTML = `
                            <div>
                                <p class="font-bold text-sm">${item.month}</p>
                                <p class="text-[10px] text-green-600 font-bold">In: Rp ${item.income.toLocaleString('id-ID')}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-extrabold text-sm text-[#8b5e5e]">Out: Rp ${item.expense.toLocaleString('id-ID')}</p>
                                <p class="text-[9px] opacity-50">Net: Rp ${item.balance.toLocaleString('id-ID')}</p>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p class="text-center py-4 text-sm opacity-50">Belum ada riwayat.</p>';
                }
                
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        fetchData();
    </script>
</body>
</html>
